version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-t4
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    environment:
      - OLLAMA_KEEP_ALIVE=24h

    runtime: nvidia

volumes:
  ollama_data:
