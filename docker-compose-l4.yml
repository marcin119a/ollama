version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-l4
    restart: unless-stopped
    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - OLLAMA_KEEP_ALIVE=24h

    command: >
      bash -c "
      ollama serve &
      sleep 10 &&
      ollama pull qwen2.5:7b &&
      ollama pull mxbai-embed-large &&
      wait
      "

volumes:
  ollama_data:
